services:
  chimera:
    build: .
    image: chimera:latest
    container_name: chimera
    volumes:
      - ./projects:/projects
      - ./cache:/cache
    ports:
      - "3000:3000"
      - "8080:8080"
    environment:
      - GHIDRA_HOME=/opt/ghidra
      - GHIDRA_MAX_MEM=4g
    deploy:
      resources:
        limits:
          memory: 14G
        reservations:
          memory: 4G
    devices:
      - /dev/bus/usb:/dev/bus/usb
    stdin_open: true
    tty: true
